name: Build Single HTML and Create Release

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # נדרש ליצירת Release

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies and Build
        run: |
          # יצירת package.json בסיסי אם הוא לא קיים כדי למנוע שגיאות התקנה
          if [ ! -f package.json ]; then npm init -y; fi
          
          # התקנת Vite והתוסף שאחראי על איחוד הקבצים לקובץ אחד
          npm install vite vite-plugin-singlefile --save-dev
          
          # יצירת קובץ הגדרות זמני עבור Vite שמפעיל את ה-SingleFile
          echo "import { defineConfig } from 'vite'; import { viteSingleFile } from 'vite-plugin-singlefile'; export default defineConfig({ plugins: [viteSingleFile()] });" > vite.config.js
          
          # הרצת ה-Build - זה ייצור קובץ index.html בתוך תיקיית dist
          npx vite build

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "Release v1.0.${{ github.run_number }}"
          files: dist/index.html
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
